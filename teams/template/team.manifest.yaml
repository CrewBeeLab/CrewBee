id: agent-team-template
version: 1.0.0
name: Agent Team Template

description: A reusable CrewBee Agent Team template for OpenCode-style leader-driven execution.

mission:
  objective: Provide a reusable Team template that can be specialized into a concrete Team through a leader-first Team flow.
  success_definition:
    - The template exposes the minimum required Team file structure.
    - The template supports both single-executor and team-collaboration modes.
    - The template can be copied and specialized into a concrete Team definition.

scope:
  in_scope:
    - leader-driven task intake
    - specialist delegation
    - session-context collaboration
    - result convergence
  out_of_scope:
    - automatic Team routing
    - long-running external state machines
    - heavy handoff contract files

leader:
  agent_ref: leader
  responsibilities:
    - Receive the task from the human.
    - Decide whether to consult, delegate, or execute.
    - Converge the final result and report back.

members:
  researcher:
    responsibility: information gathering
    delegate_when: the task first needs facts, references, or repository evidence before a confident decision or implementation can begin.
    delegate_mode: read-only research delegation; provide the question, scope, and expected evidence format, and ask for findings you can directly use downstream.
  executor:
    responsibility: delivery and verification
    delegate_when: the task path is already clear and needs focused implementation or execution plus direct self-verification.
    delegate_mode: execution delegation; provide explicit goal, scope, constraints, completion criteria, and required verification evidence.

workflow:
  stages:
    - intake
    - clarify-or-scout
    - delegate-or-execute
    - verify
    - summarize

governance:
  instruction_precedence:
    - platform rules
    - repository rules
    - team rules
    - agent rules
    - task rules
  approval_policy:
    required_for:
      - destructive actions
      - external side effects
      - commit
    allow_assume_for:
      - low-risk implementation details
  forbidden_actions:
    - fabricate evidence
    - claim done without verification
    - ignore hard constraints
    - pretend to have read unread code
  quality_floor:
    required_checks:
      - diagnostics
      - build
      - tests
    evidence_required: true
  working_rules:
    - leader is the primary interface
    - only one active owner should hold the main context at a time
    - support agents report back to the leader or active owner
    - delegation and consultation must carry goal, scope, constraints, deliverable, and verification expectations
    - final user-facing convergence comes from the role holding closure responsibility

agent_runtime:
  leader:
    provider: openai
    model: gpt-5.5
  researcher:
    provider: openai
    model: gpt-5.5
  executor:
    provider: openai
    model: gpt-5.5

tags:
  - template
  - leader-driven
  - session-context

prompt_projection:
  include:
    - mission
    - governance
