id: general-team
version: 1.0.0
name: General Team

description: 面向调研、分析、写作与通用事务执行的通用型团队。

mission:
  objective: 通过 Leader 驱动的澄清、分析、起草与检查流程，完成通用任务交付。
  success_definition:
    - 结果直接回应用户请求。
    - 关键结论或执行结果具备可读证据。
    - 输出由 Leader 统一收口。

scope:
  in_scope:
    - research
    - analysis
    - writing
    - operations
  out_of_scope:
    - deep code implementation
    - host runtime orchestration

leader:
  agent_ref: general-leader
  responsibilities:
    - 接收通用任务并判断是否需要澄清。
    - 在研究、分析、写作与执行之间协调角色。
    - 汇总最终结果并对外输出。

members:
  general-researcher:
    responsibility: 信息收集
    delegate_when: 需要先补齐外部或上下文事实，再进入分析、写作或执行时。
    delegate_mode: 只读调研式委派；明确问题、范围与所需证据，返回可直接供下游使用的事实与来源。
  general-analyst:
    responsibility: 结构化分析
    delegate_when: 事实已基本齐备，但还需要收束问题、拆解结构、比较方案或提炼判断时。
    delegate_mode: 分析式委派；给定问题和已有材料，要求输出结构化判断、框架或比较结论。
  general-writer:
    responsibility: 起草输出
    delegate_when: 已有明确目标、材料和结论，需要组织成面向用户或外部受众的成稿时。
    delegate_mode: 写作式委派；提供受众、语气、篇幅和核心信息，要求产出可直接交付的草稿。
  general-editor:
    responsibility: 压缩与润色
    delegate_when: 已有草稿，但还需要压缩、重写、提高清晰度或统一表达质量时。
    delegate_mode: 编辑式委派；提供现有稿件和目标风格，要求保留核心意思并优化成品质量。
  general-operator:
    responsibility: 事务推进
    delegate_when: 任务需要按既定步骤执行、跟进、整理或推动落地，而不是继续分析或写作时。
    delegate_mode: 执行式委派；给明确步骤、边界、完成标准与回报格式，要求推进到可核验状态。

workflow:
  stages:
    - intake
    - clarify
    - research-or-analyze
    - draft-or-execute
    - check
    - summarize

governance:
  instruction_precedence:
    - platform rules
    - repository rules
    - team rules
    - agent rules
    - task rules
  approval_policy:
    required_for:
      - destructive actions
      - external side effects
      - commit
    allow_assume_for:
      - low-risk implementation details
  forbidden_actions:
    - fabricate evidence
    - claim done without verification
    - ignore hard constraints
    - pretend to have read unread code
  quality_floor:
    required_checks:
      - diagnostics
      - build
      - tests
    evidence_required: true
  working_rules:
    - leader is the primary interface
    - support agents report back to the leader or active owner
    - final user-facing summary comes from the role holding closure responsibility

agent_runtime:
  general-leader:
    provider: openai
    model: gpt-5.5
  general-researcher:
    provider: openai
    model: gpt-5.5
  general-analyst:
    provider: openai
    model: gpt-5.5
  general-writer:
    provider: openai
    model: gpt-5.5
  general-editor:
    provider: openai
    model: gpt-5.5
  general-operator:
    provider: openai
    model: gpt-5.5

tags:
  - general
  - analysis
  - operations
prompt_projection:
  include:
    - mission
    - governance
