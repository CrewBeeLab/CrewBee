name: publish
run-name: "release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.repository == 'CrewBeeLab/CrewBee'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        id: release
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?)$ ]]; then
            echo "::error::Release tags must use vX.Y.Z or vX.Y.Z-prerelease format."
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          LOCK_VERSION=$(node -p "require('./package-lock.json').version")
          LOCK_ROOT_VERSION=$(node -p "require('./package-lock.json').packages[''].version")

          if [ "$VERSION" != "$PACKAGE_VERSION" ] || [ "$VERSION" != "$LOCK_VERSION" ] || [ "$VERSION" != "$LOCK_ROOT_VERSION" ]; then
            echo "::error::Tag version, package.json, and package-lock.json must all match."
            exit 1
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/crewbee/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "::error::crewbee@${VERSION} is already published."
            exit 1
          fi

          DIST_TAG="next"
          STABLE="true"
          if [[ "$VERSION" == *"-"* ]]; then
            DIST_TAG=$(printf '%s' "$VERSION" | cut -d'-' -f2 | cut -d'.' -f1)
            STABLE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Run OpenCode simulator
        run: npm run simulate:opencode

      - name: Run compaction simulator
        run: npm run simulate:compact

      - name: Run doctor
        run: npm run doctor

      - name: Pack release tarball
        id: pack
        run: |
          set -euo pipefail
          npm run pack:release
          TARBALL=$(find .artifacts/release -name 'crewbee-*.tgz' -print -quit)
          if [ -z "$TARBALL" ]; then
            echo "::error::release tarball was not generated."
            exit 1
          fi
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Smoke test packed package
        run: node ./scripts/smoke-packed-package.mjs "${{ steps.pack.outputs.tarball }}"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest

      - name: Smoke test real OpenCode loading path from local tarball
        run: |
          set -euo pipefail
          npm run install:local:user
          opencode models --print-logs --log-level DEBUG
          opencode agent list --print-logs --log-level DEBUG

      - name: Publish npm package to staging dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          DIST_TAG: ${{ steps.release.outputs.dist_tag }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: npm publish "$TARBALL" --access public --provenance --tag "$DIST_TAG"

      - name: Smoke test package fetched from npm registry
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts/registry-smoke
          npm pack "crewbee@${VERSION}" --pack-destination .artifacts/registry-smoke
          TARBALL=$(find .artifacts/registry-smoke -name 'crewbee-*.tgz' -print -quit)
          if [ -z "$TARBALL" ]; then
            echo "::error::registry smoke tarball was not generated."
            exit 1
          fi
          node ./scripts/smoke-packed-package.mjs "$TARBALL"

      - name: Promote stable release to latest
        if: steps.release.outputs.stable == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
        run: npm dist-tag add "crewbee@${VERSION}" latest

      - name: Verify latest registry install in OpenCode
        if: steps.release.outputs.stable == 'true'
        run: |
          set -euo pipefail
          node ./bin/crewbee.js install --source registry
          node ./bin/crewbee.js version
          node ./bin/crewbee.js doctor
          opencode models --print-logs --log-level DEBUG

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release.outputs.stable != 'true' }}
          generate_release_notes: true
