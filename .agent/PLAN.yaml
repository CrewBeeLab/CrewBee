schema_version: 1

plan:
  current_cycle: 2
  current_step_id: "S4"
  objective: "Initialize an execution-ready AgentScroll Team framework"
  success_criteria:
    - "Team manifest/policy/shared-capabilities/agent-profile contracts exist in src/"
    - "A file-based Team starter exists under scaffold/"
    - "Canonical docs and .agent docs reflect the aligned V1 model"
    - "Framework prompt and planning prompt exist for future sessions"
    - "Typecheck passes after scaffold updates"

steps:
  - id: "S1"
    title: "Understand target AgentScroll model"
    status: "done" # todo|doing|done|blocked
    depends_on: []
    acceptance:
      - "Internal docs are read and distilled into an actionable target model"
      - "Current repo scaffold is inventoried"

  - id: "S2"
    title: "Align typed framework contracts and Team library"
    status: "done"
    depends_on: ["S1"]
    acceptance:
      - "Core contracts model Team manifests, policies, shared capabilities, agent profiles, runtime snapshot, and host capabilities"
      - "Baseline Teams exist for Coding, General, and Wukong using the aligned model"
      - "Manager and Adapter scaffolds import the aligned Team definitions"

  - id: "S3"
    title: "Add starter Team scaffold and update .agent prompts"
    status: "done"
    depends_on: ["S2"]
    acceptance:
      - "Starter Team files exist for manifest, policy, shared capabilities, agents, and TEAM.md"
      - "Framework prompt and planning prompt guide future implementation cycles"
      - ".agent docs point future sessions at the aligned scaffold"

  - id: "S4"
    title: "Validate and hand off execution-ready baseline"
    status: "done"
    depends_on: ["S3"]
    acceptance:
      - "Typecheck passes"
      - "Top-level docs stay aligned with the framework shape"
      - "The repo is ready for adapter, loader, and manager implementation work"
