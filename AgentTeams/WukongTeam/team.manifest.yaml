id: wukong-team
kind: agent-team
version: 1.0.0
name: Wukong Team
status: active
owner: CrewBee

description: 面向高不确定性、探索性与长周期任务的突破型团队。

mission:
  objective: 通过 Leader 驱动的探索、借力、破局与复盘流程推进复杂任务。
  success_definition:
    - 团队打开一条可行推进路径。
    - 风险、经验与下一步选项被明确记录。
    - 最终结果仍然保持清晰职责边界与可复用性。

scope:
  in_scope:
    - exploration
    - uncertain planning
    - multi-step investigation
  out_of_scope:
    - simple execution tasks that fit Coding or General Team better

leader:
  agent_ref: wukong-leader
  responsibilities:
    - 接收复杂探索型任务。
    - 组织突破式的委派与借力。
    - 汇总阶段性成果、风险与下一步建议。

members:
  - agent_ref: wukong-monk
    role: 使命锚定
  - agent_ref: wukong-bajie
    role: 现实约束与权衡压力
  - agent_ref: wukong-wujing
    role: 稳定执行
  - agent_ref: wukong-dragon
    role: 上下文连续性

workflow:
  id: wukong-default
  name: Wukong default workflow
  stages:
    - make-vow
    - explore
    - borrow-strength
    - break-through
    - clear-gate
    - review

governance:
  instruction_precedence:
    - platform rules
    - repository rules
    - team rules
    - agent rules
    - task rules
  approval_policy:
    required_for:
      - destructive actions
      - external side effects
      - commit
    allow_assume_for:
      - low-risk implementation details
  forbidden_actions:
    - fabricate evidence
    - claim done without verification
    - ignore hard constraints
    - pretend to have read unread code
  quality_floor:
    required_checks:
      - diagnostics
      - build
      - tests
    evidence_required: true
  working_rules:
    - leader is the primary interface
    - support agents report back to the leader or active owner
    - final user-facing summary comes from the role holding closure responsibility

agent_runtime:
  wukong-leader:
    provider: openai
    model: gpt-5.4
  wukong-monk:
    provider: openai
    model: gpt-5.4
  wukong-bajie:
    provider: openai
    model: gpt-5.4
  wukong-wujing:
    provider: openai
    model: gpt-5.4
  wukong-dragon:
    provider: openai
    model: gpt-5.4

tags:
  - exploration
  - uncertainty
  - breakthrough
prompt_projection:
  include:
    - mission
    - workflow
    - governance
