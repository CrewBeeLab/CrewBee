id: wukong-team
kind: agent-team
version: 1.0.0
name: Wukong Team
status: active
owner: CrewBee

description: 面向高不确定性、探索性与长周期任务的突破型团队。

mission:
  objective: 通过 Leader 驱动的探索、借力、破局与复盘流程推进复杂任务。
  success_definition:
    - 团队打开一条可行推进路径。
    - 风险、经验与下一步选项被明确记录。
    - 最终结果仍然保持清晰职责边界与可复用性。

scope:
  in_scope:
    - exploration
    - uncertain planning
    - multi-step investigation
  out_of_scope:
    - simple execution tasks that fit Coding or General Team better

leader:
  agent_ref: wukong-leader
  responsibilities:
    - 接收复杂探索型任务。
    - 组织突破式的委派与借力。
    - 汇总阶段性成果、风险与下一步建议。

members:
  - agent_ref: wukong-monk
    role: 使命锚定
  - agent_ref: wukong-bajie
    role: 现实约束与权衡压力
  - agent_ref: wukong-wujing
    role: 稳定执行
  - agent_ref: wukong-dragon
    role: 上下文连续性

modes:
  - single-executor
  - team-collaboration

working_mode:
  human_to_leader_only: true
  leader_driven_coordination: true
  single_active_context_owner: true
  agent_communication_via_session_context: true
  explicit_routing_files_required: false
  explicit_contract_files_required: false

workflow:
  id: wukong-default
  name: Wukong default workflow
  stages:
    - make-vow
    - explore
    - borrow-strength
    - break-through
    - clear-gate
    - review

ownership_routing:
  default_active_owner: wukong-leader
  switch_to_management_leader_when:
    - 任务仍主要需要探路、重构问题定义或决定下一步借力方向
    - 尚未形成可稳定推进的单一路径，继续执行会放大试错成本

role_boundaries:
  write_execution_roles:
    - wukong-leader
    - wukong-wujing
    - wukong-dragon
  read_only_support_roles:
    - wukong-monk
    - wukong-bajie

structure_principles:
  - 同一时刻只保留一个 active owner 持有主上下文
  - 探路、借力、稳态推进和上下文续航分别由不同角色承担
  - 即使允许更强的探索节奏，也必须由 leader 统一收口

implementation_bias:
  naming_mode: hybrid
  routing_priority: balanced
  prompt_emphasis: persona-high / responsibility-high
  display_emphasis: balanced
  persona_visibility: high
  responsibility_visibility: high

governance:
  instruction_precedence:
    - platform rules
    - repository rules
    - team rules
    - agent rules
    - task rules
  approval_policy:
    required_for:
      - destructive actions
      - external side effects
      - commit
    allow_assume_for:
      - low-risk implementation details
  forbidden_actions:
    - fabricate evidence
    - claim done without verification
    - ignore hard constraints
    - pretend to have read unread code
  quality_floor:
    required_checks:
      - diagnostics
      - build
      - tests
    evidence_required: true
  working_rules:
    - leader is the primary interface
    - support agents report back to the leader or active owner
    - final user-facing summary comes from the role holding closure responsibility
  notes:
    - Wukong Team 优先处理高不确定性探索任务。
    - 允许更强的探路和借力节奏，但仍保持单一收口责任。

agent_runtime:
  wukong-leader:
    provider: openai
    model: gpt-5.4
  wukong-monk:
    provider: openai
    model: gpt-5.4
  wukong-bajie:
    provider: openai
    model: gpt-5.4
  wukong-wujing:
    provider: openai
    model: gpt-5.4
  wukong-dragon:
    provider: openai
    model: gpt-5.4

tags:
  - exploration
  - uncertainty
  - breakthrough
