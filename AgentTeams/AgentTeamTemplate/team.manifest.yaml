id: agent-team-template
kind: agent-team
version: 1.0.0
name: Agent Team Template
status: active
owner: CrewBee

description: A reusable CrewBee Agent Team template for OpenCode-style leader-driven execution.

mission:
  objective: Provide a reusable Team template that can be specialized into a concrete Team through a leader-first Team flow.
  success_definition:
    - The template exposes the minimum required Team file structure.
    - The template supports both single-executor and team-collaboration modes.
    - The template can be copied and specialized into a concrete Team definition.

scope:
  in_scope:
    - leader-driven task intake
    - specialist delegation
    - session-context collaboration
    - result convergence
  out_of_scope:
    - automatic Team routing
    - long-running external state machines
    - heavy handoff contract files

leader:
  agent_ref: leader
  responsibilities:
    - Receive the task from the human.
    - Decide whether to consult, delegate, or execute.
    - Converge the final result and report back.

members:
  - agent_ref: researcher
    role: information gathering
  - agent_ref: executor
    role: delivery and verification

modes:
  - single-executor
  - team-collaboration

working_mode:
  human_to_leader_only: true
  leader_driven_coordination: true
  single_active_context_owner: true
  agent_communication_via_session_context: true
  explicit_routing_files_required: false
  explicit_contract_files_required: false

workflow:
  id: template-default
  name: Template default workflow
  stages:
    - intake
    - clarify-or-scout
    - delegate-or-execute
    - verify
    - summarize

ownership_routing:
  default_active_owner: leader
  switch_to_management_leader_when:
    - the task is still primarily about scope shaping or routing decisions
    - there is not yet a single executable path with clear acceptance

role_boundaries:
  write_execution_roles:
    - leader
    - executor
  read_only_support_roles:
    - researcher

structure_principles:
  - keep one active owner on the main context chain
  - delegate specialists on demand instead of fragmenting the main path
  - keep research separate from execution when both are needed

governance:
  instruction_precedence:
    - platform rules
    - repository rules
    - team rules
    - agent rules
    - task rules
  approval_policy:
    required_for:
      - destructive actions
      - external side effects
      - commit
    allow_assume_for:
      - low-risk implementation details
  forbidden_actions:
    - fabricate evidence
    - claim done without verification
    - ignore hard constraints
    - pretend to have read unread code
  quality_floor:
    required_checks:
      - diagnostics
      - build
      - tests
    evidence_required: true
  working_rules:
    - leader is the primary interface
    - only one active owner should hold the main context at a time
    - support agents report back to the leader or active owner
    - delegation and consultation must carry goal, scope, constraints, deliverable, and verification expectations
    - final user-facing convergence comes from the role holding closure responsibility
  notes:
    - Session Context is the default collaboration channel.
    - Explicit routing and contract files are intentionally out of the starter scope.

implementation_bias:
  naming_mode: responsibility-first
  routing_priority: responsibility-first
  prompt_emphasis: responsibility-high / persona-balanced
  display_emphasis: balanced
  persona_visibility: balanced
  responsibility_visibility: high

agent_runtime:
  leader:
    provider: openai
    model: gpt-5.4
  researcher:
    provider: openai
    model: gpt-5.4
  executor:
    provider: openai
    model: gpt-5.4

tags:
  - template
  - leader-driven
  - session-context
