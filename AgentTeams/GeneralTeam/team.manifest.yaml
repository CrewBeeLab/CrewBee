id: general-team
kind: agent-team
version: 1.0.0
name: General Team
status: active
owner: CrewBee

description: 面向调研、分析、写作与通用事务执行的通用型团队。

mission:
  objective: 通过 Leader 驱动的澄清、分析、起草与检查流程，完成通用任务交付。
  success_definition:
    - 结果直接回应用户请求。
    - 关键结论或执行结果具备可读证据。
    - 输出由 Leader 统一收口。

scope:
  in_scope:
    - research
    - analysis
    - writing
    - operations
  out_of_scope:
    - deep code implementation
    - host runtime orchestration

leader:
  agent_ref: general-leader
  responsibilities:
    - 接收通用任务并判断是否需要澄清。
    - 在研究、分析、写作与执行之间协调角色。
    - 汇总最终结果并对外输出。

members:
  - agent_ref: general-researcher
    role: 信息收集
  - agent_ref: general-analyst
    role: 结构化分析
  - agent_ref: general-writer
    role: 起草输出
  - agent_ref: general-editor
    role: 压缩与润色
  - agent_ref: general-operator
    role: 事务推进

workflow:
  id: general-default
  name: General default workflow
  stages:
    - intake
    - clarify
    - research-or-analyze
    - draft-or-execute
    - check
    - summarize

governance:
  instruction_precedence:
    - platform rules
    - repository rules
    - team rules
    - agent rules
    - task rules
  approval_policy:
    required_for:
      - destructive actions
      - external side effects
      - commit
    allow_assume_for:
      - low-risk implementation details
  forbidden_actions:
    - fabricate evidence
    - claim done without verification
    - ignore hard constraints
    - pretend to have read unread code
  quality_floor:
    required_checks:
      - diagnostics
      - build
      - tests
    evidence_required: true
  working_rules:
    - leader is the primary interface
    - support agents report back to the leader or active owner
    - final user-facing summary comes from the role holding closure responsibility

agent_runtime:
  general-leader:
    provider: openai
    model: gpt-5.4
  general-researcher:
    provider: openai
    model: gpt-5.4
  general-analyst:
    provider: openai
    model: gpt-5.4
  general-writer:
    provider: openai
    model: gpt-5.4
  general-editor:
    provider: openai
    model: gpt-5.4
  general-operator:
    provider: openai
    model: gpt-5.4

tags:
  - general
  - analysis
  - operations
prompt_projection:
  include:
    - mission
    - workflow
    - governance
